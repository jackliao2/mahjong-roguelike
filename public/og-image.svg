<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B1810"/>
      <stop offset="100%" style="stop-color:#3D2418"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C088"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative tiles -->
  <g transform="translate(80, 120)">
    <!-- Tile 1 -->
    <rect x="0" y="0" width="80" height="110" fill="#F5E6D3" rx="4" stroke="#2B1810" stroke-width="2"/>
    <rect x="4" y="4" width="72" height="3" fill="#FFFFFF" opacity="0.4"/>
    <text x="40" y="45" font-family="monospace" font-size="28" fill="#1A1A2E" text-anchor="middle" font-weight="bold">1</text>
    <text x="40" y="75" font-family="monospace" font-size="10" fill="#1A1A2E" text-anchor="middle">CHAR</text>
  </g>
  <g transform="translate(180, 120)">
    <rect x="0" y="0" width="80" height="110" fill="#F5E6D3" rx="4" stroke="#2B1810" stroke-width="2"/>
    <rect x="4" y="4" width="72" height="3" fill="#FFFFFF" opacity="0.4"/>
    <text x="40" y="45" font-family="monospace" font-size="28" fill="#2C5F8A" text-anchor="middle" font-weight="bold">5</text>
    <text x="40" y="75" font-family="monospace" font-size="10" fill="#2C5F8A" text-anchor="middle">DOTS</text>
  </g>
  <g transform="translate(280, 120)">
    <rect x="0" y="0" width="80" height="110" fill="#F5E6D3" rx="4" stroke="#2B1810" stroke-width="2"/>
    <rect x="4" y="4" width="72" height="3" fill="#FFFFFF" opacity="0.4"/>
    <text x="40" y="45" font-family="monospace" font-size="28" fill="#2D6A4F" text-anchor="middle" font-weight="bold">9</text>
    <text x="40" y="75" font-family="monospace" font-size="10" fill="#2D6A4F" text-anchor="middle">BAM</text>
  </g>

  <!-- Title -->
  <text x="600" y="280" font-family="'Press Start 2P', monospace" font-size="52" fill="#F5E6D3" text-anchor="middle" font-weight="bold">MAHJONG</text>
  <text x="600" y="350" font-family="'Press Start 2P', monospace" font-size="52" fill="url(#amber)" text-anchor="middle" font-weight="bold">ROGUELIKE</text>

  <!-- Subtitle -->
  <text x="600" y="420" font-family="Inter, sans-serif" font-size="24" fill="#C9B89A" text-anchor="middle">Learn riichi mahjong through roguelike deckbuilding</text>

  <!-- Tags -->
  <g transform="translate(600, 480)">
    <rect x="-200" y="0" width="120" height="36" fill="#C73E3A" rx="4"/>
    <text x="-140" y="24" font-family="monospace" font-size="14" fill="#F5E6D3" text-anchor="middle">FREE</text>
    <rect x="-60" y="0" width="120" height="36" fill="#D4A574" rx="4"/>
    <text x="0" y="24" font-family="monospace" font-size="14" fill="#2B1810" text-anchor="middle">BROWSER</text>
    <rect x="80" y="0" width="120" height="36" fill="#2D6A4F" rx="4"/>
    <text x="140" y="24" font-family="monospace" font-size="14" fill="#F5E6D3" text-anchor="middle">PIXEL ART</text>
  </g>

  <!-- Inspired by -->
  <text x="600" y="570" font-family="Inter, sans-serif" font-size="16" fill="#8B6F47" text-anchor="middle">Inspired by Balatro &amp; Slay the Spire</text>
</svg>
